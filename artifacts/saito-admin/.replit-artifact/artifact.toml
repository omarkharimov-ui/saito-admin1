kind = "web"
previewPath = "/"
title = "Saito Admin"
version = "1.0.0"
id = "artifacts/saito-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22186

[services.development]
run = "pnpm --filter @workspace/saito-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saito-admin", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/saito-admin", "run", "start" ]

[services.env]
PORT = "22186"
BASE_PATH = "/"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="30%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D96B"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8960C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#D4AF37" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Glow center -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="112" fill="none" stroke="#D4AF37" stroke-width="3" stroke-opacity="0.2"/>

  <!-- S letter — stylized serif -->
  <text
    x="256"
    y="310"
    font-family="Georgia, serif"
    font-size="280"
    font-weight="700"
    text-anchor="middle"
    fill="url(#gold)"
    filter="url(#shadow)"
    letter-spacing="-8"
  >S</text>

  <!-- Bottom accent line -->
  <rect x="176" y="370" width="160" height="3" rx="1.5" fill="url(#gold)" opacity="0.6"/>
</svg>
